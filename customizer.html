<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Warehouse</title>
<link rel="stylesheet" href="customizer.css">
</head>

<body>

<header class="navbar">

<div class="logo">
Creator<br>Warehouse 
</div>

<nav>
<a class="active">Design</a>
<a>Shop</a>
<a>Gallery</a>
<a>How It Works</a>
<a>Cart (2)</a>
<a>Account</a>
</nav>

<button class="start">GET STARTED</button>

</header>



<div class="container">

<!-- LEFT PREVIEW -->

<div class="preview-area">

<div class="grid">

<img id="shirt" src="tshirt.png">

</div>

</div>



<!-- DESIGN OPTIONS -->

<div class="options">

<h4>CLOTH TYPE</h4>

<div class="cloths">

<button class="cloth active">T-SHIRTS</button>
<button class="cloth">HOODIES</button>
<button class="cloth">SWEATSHIRTS</button>
<button class="cloth">JACKETS</button>

</div>


<h4>BASE COLOR</h4>

<div class="colors">

<div class="color white" onclick="changeColor('white')"></div>
<div class="color yellow" onclick="changeColor('yellow')"></div>
<div class="color black" onclick="changeColor('black')"></div>
<div class="color blue" onclick="changeColor('blue')"></div>
<div class="color red" onclick="changeColor('red')"></div>
<div class="color green" onclick="changeColor('green')"></div>

</div>


<h4>DESIGN OPTIONS</h4>

<button class="option-btn">ADD TEXT</button>

<button class="option-btn">UPLOAD IMAGE</button>

<button class="option-btn">FABRICS DESIGN</button>



<div class="view">

<button class="active">Front</button>
<button>Back</button>
<button>Side</button>

</div>

</div>



<!-- RIGHT PANEL -->

<div class="right-panel">

<div class="steps">

<div class="step active">
Design
<div class="arrow"></div>
</div>

<div class="line"></div>

<div class="step">Options</div>

<div class="line"></div>

<div class="step">Preview</div>

<div class="line"></div>

<div class="step">Order</div>

</div>



<div class="design-card">

<div class="icons">
☰ 🗑
</div>

<img src="sampledesign.png">

<h3>WANDER</h3>

<p>SAMPLE & TEXT</p>

</div>



<div class="buttons">

<button class="preview">PREVIEW</button>

<button class="save">SAVE DESIGN</button>

</div>


<button class="cart">
